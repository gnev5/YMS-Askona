name: Build and deploy test environment

on:
  workflow_dispatch:
  push:
    branches:
      - test

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: PYTHONPATH=. pytest -q tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy test stack over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.YMS_TEST_HOST }}
          username: ${{ secrets.YMS_TEST_USER }}
          key: ${{ secrets.YMS_TEST_SSH_KEY }}
          port: ${{ secrets.YMS_TEST_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR=/home/gnev5hermes/yms-askona-test
            REPO_URL=https://github.com/gnev5/YMS-Askona.git
            BRANCH=test

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              TMP_DIR=$(mktemp -d)
              git clone --branch "$BRANCH" "$REPO_URL" "$TMP_DIR"
              cp -a "$TMP_DIR"/. "$APP_DIR"/
              rm -rf "$TMP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            mkdir -p backups
            test -f .env.test

            export BACKEND_IMAGE="ymsaskona-backend:test-$SHORT_SHA"
            export FRONTEND_IMAGE="ymsaskona-frontend:test-$SHORT_SHA"

            docker compose --env-file .env.test -f docker-compose.test.yml build test_backend test_frontend
            docker compose --env-file .env.test -f docker-compose.test.yml up -d
            docker compose --env-file .env.test -f docker-compose.test.yml ps
            for i in $(seq 1 12); do
              curl -fsS http://127.0.0.1:18000/health && break
              sleep 5
            done
            for i in $(seq 1 12); do
              curl -fsS http://127.0.0.1:15173/ >/dev/null && break
              sleep 5
            done
