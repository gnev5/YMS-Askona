name: Build and deploy test environment

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to the YMS test stack after pushing images"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - test

permissions:
  contents: read

env:
  BACKEND_IMAGE: vallabe/ymsaskona-backend
  FRONTEND_IMAGE: vallabe/ymsaskona-frontend

jobs:
  build-test-images:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend test image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:test-latest
            ${{ env.BACKEND_IMAGE }}:test-${{ steps.meta.outputs.short_sha }}

      - name: Build and push frontend test image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:test-latest
            ${{ env.FRONTEND_IMAGE }}:test-${{ steps.meta.outputs.short_sha }}

  deploy-test:
    needs: build-test-images
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure test directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.YMS_TEST_HOST }}
          username: ${{ secrets.YMS_TEST_USER }}
          key: ${{ secrets.YMS_TEST_SSH_KEY }}
          port: ${{ secrets.YMS_TEST_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /home/gnev5hermes/yms-askona-test/backups

      - name: Upload test compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.YMS_TEST_HOST }}
          username: ${{ secrets.YMS_TEST_USER }}
          key: ${{ secrets.YMS_TEST_SSH_KEY }}
          port: ${{ secrets.YMS_TEST_SSH_PORT || '22' }}
          source: docker-compose.test.yml
          target: /home/gnev5hermes/yms-askona-test

      - name: Deploy test compose stack over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SHORT_SHA: ${{ needs.build-test-images.outputs.short_sha }}
        with:
          host: ${{ secrets.YMS_TEST_HOST }}
          username: ${{ secrets.YMS_TEST_USER }}
          key: ${{ secrets.YMS_TEST_SSH_KEY }}
          port: ${{ secrets.YMS_TEST_SSH_PORT || '22' }}
          envs: SHORT_SHA
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/gnev5hermes/yms-askona-test
            test -f .env.test
            docker compose --env-file .env.test -f docker-compose.test.yml pull
            docker compose --env-file .env.test -f docker-compose.test.yml up -d
            docker compose --env-file .env.test -f docker-compose.test.yml ps
            curl -fsS http://127.0.0.1:18000/health
            curl -fsSI http://127.0.0.1:15173/
